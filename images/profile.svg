<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="pfTitle pfDesc">
  <title id="pfTitle">Profile placeholder</title>
  <desc id="pfDesc">Generic circular avatar placeholder with initials</desc>
  <defs>
    <linearGradient id="pg" x1="0" x2="1">
      <stop offset="0%" stop-color="#14304a"/>
      <stop offset="100%" stop-color="#375fa3"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="url(#pg)"/>
  <g transform="translate(200,160)">
    <circle r="72" fill="rgba(255,255,255,0.06)" />
    <text x="0" y="12" font-size="48" font-family="Arial, Helvetica, sans-serif" fill="#e6eef8" text-anchor="middle" font-weight="700">RV</text>
  </g>
</svg>